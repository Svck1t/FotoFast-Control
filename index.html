<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Foto Fast"/>
<title>Foto Fast SpA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --sidebar: #0D1117;
    --accent: #E67E22;
    --accent2: #F39C12;
    --text: #0D1117;
    --muted: #6B7280;
    --border: #E5E7EB;
    --green: #10B981;
    --red: #EF4444;
    --blue: #3B82F6;
    --yellow: #F59E0B;
    --purple: #8B5CF6;
    --radius: 12px;
    --shadow: 0 1px 6px rgba(0,0,0,0.08);
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); background: var(--sidebar); flex-shrink: 0;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0;
    height: 100vh; z-index: 200; transition: transform 0.3s ease;
  }
  .sidebar.closed { transform: translateX(-100%); }
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 28px; min-height: 100vh; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
  .overlay.show { display: block; }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 16px; padding-bottom: 80px; }
    .topbar { display: flex !important; }
    .bottom-nav { display: flex !important; }
  }

  /* Topbar (mobile only) */
  .topbar {
    display: none; position: sticky; top: 0; z-index: 100;
    background: var(--sidebar); padding: 14px 16px;
    align-items: center; gap: 14px; margin: -16px -16px 16px;
  }
  .topbar-title { font-family: 'DM Serif Display', serif; color: var(--accent); font-size: 18px; flex: 1; }
  .hamburger { background: none; border: none; cursor: pointer; color: #fff; padding: 4px; }

  /* Bottom nav (mobile only) */
  .bottom-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--sidebar); padding: 8px 0 env(safe-area-inset-bottom, 8px);
    z-index: 100; border-top: 1px solid #1e2530;
  }
  .bottom-nav-inner { display: flex; justify-content: space-around; }
  .bnav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; padding: 6px 12px;
    color: #5a6478; font-family: inherit; font-size: 10px; font-weight: 600;
    transition: color 0.15s;
  }
  .bnav-btn.active { color: var(--accent); }

  /* Sidebar internals */
  .sb-logo { padding: 24px 20px 20px; border-bottom: 1px solid #1e2530; }
  .sb-logo-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); }
  .sb-logo-sub { font-size: 10px; color: #3a4455; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .sb-nav { flex: 1; padding: 14px 0; overflow-y: auto; }
  .sb-btn {
    display: flex; align-items: center; gap: 12px; width: 100%;
    padding: 12px 20px; background: none; border: none; cursor: pointer;
    color: #8892a4; font-size: 14px; font-weight: 500; font-family: inherit;
    transition: all 0.15s; text-align: left;
  }
  .sb-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .sb-btn.active { color: #fff; background: var(--accent); }
  .sb-footer { padding: 16px 20px; border-top: 1px solid #1e2530; text-align: center; }
  .sb-footer-label { font-size: 10px; color: #3a4455; }
  .sb-footer-val { font-size: 16px; font-weight: 700; color: var(--accent); margin-top: 2px; }

  /* Cards */
  .card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .stat-card { border-left: 4px solid; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  @media (max-width: 900px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 400px) { .grid-4 { grid-template-columns: 1fr 1fr; } }

  .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .stat-value { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .stat-sub { font-size: 12px; color: var(--muted); }

  /* Page header */
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); }
  @media (max-width: 500px) { .page-title { font-size: 22px; } }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 2px solid transparent; transition: all 0.15s;
    font-family: inherit; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-outline-blue { background: transparent; color: var(--blue); border-color: var(--blue); }
  .btn-outline-red { background: transparent; color: var(--red); border-color: var(--red); }
  .btn-outline-green { background: transparent; color: var(--green); border-color: var(--green); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 7px; border-radius: 8px; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  /* Items list */
  .item-row {
    background: var(--surface); border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); margin-bottom: 10px; display: flex;
    gap: 14px; align-items: flex-start;
  }
  .item-row-body { flex: 1; min-width: 0; }
  .item-row-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .item-name { font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 4px; }
  .item-meta { font-size: 12px; color: var(--muted); }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .form-input, .form-select {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text);
    outline: none; transition: border-color 0.2s; background: #fff;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 400px) { .form-row { grid-template-columns: 1fr; } }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(10,14,20,0.65);
    backdrop-filter: blur(4px); z-index: 500;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0;
  }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; padding: 20px; }
    .modal-box { border-radius: var(--radius) !important; max-height: 90vh !important; }
  }
  .modal-box {
    background: #fff; width: 100%; max-width: 540px;
    border-radius: 16px 16px 0 0; max-height: 92vh;
    overflow-y: auto; box-shadow: 0 -4px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
  .modal-body { padding: 20px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  /* Total box */
  .total-box { background: #FFF8F0; border: 2px solid var(--accent); border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-weight: 800; font-size: 18px; color: var(--accent); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty svg { opacity: 0.3; margin-bottom: 16px; }
  .empty p { font-size: 15px; }

  /* Section title */
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; }

  /* Tx row */
  .tx-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #f5f5f5; }
  .tx-amount { font-weight: 700; font-size: 15px; }

  /* WA button special */
  .btn-wa { background: #25D366; color: #fff; border-color: #25D366; }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #0D1117; color: #fff; padding: 12px 24px; border-radius: 8px;
    font-size: 14px; font-weight: 600; z-index: 9999;
    animation: fadeToast 2.5s ease forwards;
  }
  @keyframes fadeToast { 0%,80%{opacity:1;} 100%{opacity:0;} }
  @media (min-width: 769px) { .toast { bottom: 24px; } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <!-- Overlay (mobile) -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-name">Foto Fast</div>
      <div class="sb-logo-sub">SpA · Gestión</div>
    </div>
    <nav class="sb-nav" id="deskNav"></nav>
    <div class="sb-footer">
      <div class="sb-footer-label">Capital inicial</div>
      <div class="sb-footer-val">$1.000.000</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Mobile topbar -->
    <div class="topbar">
      <button class="hamburger" onclick="openSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="topbar-title">Foto Fast SpA</div>
    </div>

    <div id="content"></div>
  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner" id="mobileNav"></div>
  </nav>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────
const KEYS = { clients:'ff_clients', orders:'ff_orders', transactions:'ff_transactions', inventory:'ff_inventory' };
const DEFAULT_INVENTORY = [
  {id:1, product:'Papel Fotocopia A4 75g (500 hjs)', stock:0, unitCost:0, unit:'resma'},
  {id:2, product:'Papel Fotocopia A4 80g (500 hjs)', stock:0, unitCost:0, unit:'resma'},
  {id:3, product:'Papel Fotocopia Carta 75g (500 hjs)', stock:0, unitCost:0, unit:'resma'},
];

function load(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let state = {
  tab: 'dashboard',
  clients: load(KEYS.clients, []),
  orders: load(KEYS.orders, []),
  transactions: load(KEYS.transactions, []),
  inventory: load(KEYS.inventory, DEFAULT_INVENTORY),
};

function persist(key) { save(KEYS[key], state[key]); }

// ─── Utils ────────────────────────────────────────────────────────────────────
const clp = n => '$' + Math.round(n||0).toLocaleString('es-CL');
const today = () => new Date().toISOString().split('T')[0];
const statusColor = { prospecto:'#F59E0B', activo:'#10B981', inactivo:'#9CA3AF', pendiente:'#F59E0B', entregado:'#3B82F6', pagado:'#10B981' };

function badge(text, color) {
  return `<span class="badge" style="background:${color}20;color:${color}">${text}</span>`;
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ─── Navigation ───────────────────────────────────────────────────────────────
const TABS = [
  { id:'dashboard', label:'Panel', icon:'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z' },
  { id:'clients',   label:'Clientes', icon:'M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z' },
  { id:'orders',    label:'Pedidos', icon:'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z' },
  { id:'inventory', label:'Stock', icon:'M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.53 15.86.5 13.5.5c-1.23 0-2.3.5-3.12 1.3L10 2.11 9.62 1.8C8.8 1 7.73.5 6.5.5 4.14.5 2 2.53 2 4.64c0 .48.11.92.18 1.36H0v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6z' },
  { id:'accounting',label:'Cuentas', icon:'M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z' },
];

function svgIcon(path, size=20) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="currentColor"><path d="${path}"/></svg>`;
}

function renderNav() {
  // Desktop sidebar
  document.getElementById('deskNav').innerHTML = TABS.map(t =>
    `<button class="sb-btn ${state.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
      ${svgIcon(t.icon,18)} ${t.label}
    </button>`
  ).join('');
  // Mobile bottom nav
  document.getElementById('mobileNav').innerHTML = TABS.map(t =>
    `<button class="bnav-btn ${state.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
      ${svgIcon(t.icon,20)} ${t.label}
    </button>`
  ).join('');
}

function setTab(id) { state.tab = id; closeSidebar(); render(); }

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function modal(title, bodyHTML, onSubmitId) {
  const existing = document.getElementById('modal-backdrop');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'modal-backdrop'; el.className = 'modal-backdrop';
  el.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#999;padding:4px">
          ${svgIcon('M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z',20)}
        </button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
    </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target===el) closeModal(); });
  // Focus first input
  setTimeout(() => { const inp = el.querySelector('input,select'); if(inp) inp.focus(); }, 100);
}
function closeModal() { const m = document.getElementById('modal-backdrop'); if(m) m.remove(); }

function formGroup(label, inputHTML) {
  return `<div class="form-group"><label class="form-label">${label}</label>${inputHTML}</div>`;
}
function inp(id, type, val, placeholder='') {
  return `<input class="form-input" id="${id}" type="${type}" value="${val??''}" placeholder="${placeholder}"/>`;
}
function sel(id, opts, val) {
  return `<select class="form-select" id="${id}">${opts.map(o=>`<option value="${o.v}" ${o.v==val?'selected':''}>${o.l}</option>`).join('')}</select>`;
}
function gv(id) { const el=document.getElementById(id); return el?el.value:''; }

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const { clients, orders, transactions, inventory } = state;
  const totalIng = transactions.filter(t=>t.type==='ingreso').reduce((s,t)=>s+t.amount,0);
  const totalGas = transactions.filter(t=>t.type==='gasto').reduce((s,t)=>s+t.amount,0);
  const saldo = 1000000 + totalIng - totalGas;
  const activos = clients.filter(c=>c.status==='activo').length;
  const pending = orders.filter(o=>o.status!=='pagado').length;
  const stock = inventory.reduce((s,i)=>s+(i.stock||0),0);
  const recentOrders = [...orders].sort((a,b)=>b.date?.localeCompare(a.date)).slice(0,5);

  return `
    <div class="page-header"><h1 class="page-title">Panel Principal</h1></div>
    <div class="grid-4">
      ${statCard('Saldo Actual', clp(saldo), 'Capital inicial $1.000.000', saldo>=0?'#10B981':'#EF4444')}
      ${statCard('Clientes Activos', activos, `${clients.length} clientes totales`, '#3B82F6')}
      ${statCard('Pedidos Pendientes', pending, 'Sin marcar como pagados', '#F59E0B')}
      ${statCard('Stock Total', stock+' resmas', 'Inventario actual', '#8B5CF6')}
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="section-title">Últimos Pedidos</div>
        ${recentOrders.length===0
          ? '<p style="color:var(--muted);font-size:14px">Sin pedidos aún</p>'
          : recentOrders.map(o=>`
            <div class="tx-row">
              <div>
                <div style="font-weight:700;font-size:14px">${o.clientName}</div>
                <div style="font-size:12px;color:var(--muted)">${o.date}</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;color:var(--accent)">${clp(o.total)}</div>
                ${badge(o.status, statusColor[o.status]||'#999')}
              </div>
            </div>`).join('')}
      </div>
      <div class="card">
        <div class="section-title">Resumen Financiero</div>
        ${[
          {l:'Capital Inicial', v:1000000, c:'#6B7280'},
          {l:'Total Ingresos', v:totalIng, c:'#10B981'},
          {l:'Total Gastos', v:totalGas, c:'#EF4444'},
          {l:'Saldo Neto', v:saldo, c:saldo>=0?'#10B981':'#EF4444', bold:true},
        ].map(r=>`
          <div class="tx-row">
            <span style="font-size:14px;color:#555;font-weight:${r.bold?700:400}">${r.l}</span>
            <span style="font-weight:700;color:${r.c}">${clp(r.v)}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function statCard(label, value, sub, color) {
  return `<div class="card stat-card" style="border-left-color:${color}">
    <div class="stat-label">${label}</div>
    <div class="stat-value" style="color:${color}">${value}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

// ─── Clients ─────────────────────────────────────────────────────────────────
function renderClients() {
  const { clients } = state;
  return `
    <div class="page-header">
      <h1 class="page-title">Clientes</h1>
      <button class="btn btn-primary" onclick="openClientModal()">
        ${svgIcon('M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',16)} Agregar
      </button>
    </div>
    ${clients.length===0
      ? `<div class="empty">${svgIcon('M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z',48)}<p>Sin clientes aún. ¡Agrega tu primer colegio!</p></div>`
      : clients.map(c=>`
        <div class="item-row">
          <div class="item-row-body">
            <div class="item-name">${c.name} ${badge(c.type,'#3B82F6')} ${badge(c.status, statusColor[c.status]||'#999')}</div>
            <div class="item-meta">
              ${c.contact?'👤 '+c.contact:''}${c.phone?'  📱 '+c.phone:''}${c.address?'  📍 '+c.address:''}
            </div>
            ${c.notes?`<div class="item-meta" style="font-style:italic;margin-top:3px">${c.notes}</div>`:''}
          </div>
          <div class="item-row-actions">
            ${c.phone?`<button class="btn btn-wa btn-sm" onclick="window.open('https://wa.me/56${c.phone.replace(/\D/g,'')}','_blank')">WA</button>`:''}
            <button class="btn btn-outline-blue btn-sm" onclick="openClientModal(${c.id})">Editar</button>
            <button class="btn btn-outline-red btn-sm" onclick="deleteClient(${c.id})">Borrar</button>
          </div>
        </div>`).join('')}`;
}

function openClientModal(id) {
  const c = id ? state.clients.find(x=>x.id===id) : {};
  const html = `
    ${formGroup('Nombre institución *', inp('cn','text',c.name,'Colegio San Martín'))}
    <div class="form-row">
      ${formGroup('Tipo', sel('ct',[{v:'colegio',l:'Colegio'},{v:'jardín',l:'Jardín Infantil'},{v:'otro',l:'Otro'}],c.type||'colegio'))}
      ${formGroup('Estado', sel('cs',[{v:'prospecto',l:'Prospecto'},{v:'activo',l:'Activo'},{v:'inactivo',l:'Inactivo'}],c.status||'prospecto'))}
    </div>
    <div class="form-row">
      ${formGroup('Contacto', inp('cc','text',c.contact,'Nombre persona'))}
      ${formGroup('Teléfono (sin +56)', inp('cp','tel',c.phone,'9XXXXXXXX'))}
    </div>
    ${formGroup('Dirección', inp('ca','text',c.address,'Dirección del establecimiento'))}
    ${formGroup('Notas', inp('cno','text',c.notes,'Observaciones, acuerdos...'))}
    <div class="modal-footer">
      <button class="btn" style="background:#f5f5f5;border-color:#f5f5f5;color:#666" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient(${id||0})">Guardar</button>
    </div>`;
  modal(id ? 'Editar Cliente' : 'Nuevo Cliente', html);
}

function saveClient(id) {
  const name = gv('cn').trim();
  if(!name) return alert('El nombre es obligatorio');
  const c = { id:id||Date.now(), name, type:gv('ct'), status:gv('cs'), contact:gv('cc'), phone:gv('cp'), address:gv('ca'), notes:gv('cno') };
  if(id) state.clients = state.clients.map(x=>x.id===id?c:x);
  else state.clients.push(c);
  persist('clients'); closeModal(); render(); toast('✅ Cliente guardado');
}

function deleteClient(id) {
  if(!confirm('¿Eliminar cliente?')) return;
  state.clients = state.clients.filter(c=>c.id!==id);
  persist('clients'); render(); toast('🗑️ Cliente eliminado');
}

// ─── Orders ───────────────────────────────────────────────────────────────────
function renderOrders() {
  const { orders } = state;
  return `
    <div class="page-header">
      <h1 class="page-title">Pedidos & Ventas</h1>
      <button class="btn btn-primary" onclick="openOrderModal()">
        ${svgIcon('M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',16)} Nuevo Pedido
      </button>
    </div>
    ${orders.length===0
      ? `<div class="empty">${svgIcon('M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z',48)}<p>Sin pedidos aún</p></div>`
      : [...orders].sort((a,b)=>b.date?.localeCompare(a.date)).map(o=>`
        <div class="item-row">
          <div class="item-row-body">
            <div class="item-name">
              ${o.clientName}
              <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:8px">${o.date}</span>
              ${badge(o.status, statusColor[o.status]||'#999')}
            </div>
            <div class="item-meta">📦 ${o.product} × ${o.qty} @ ${clp(o.unitPrice)} c/u${o.notes?' — '+o.notes:''}</div>
            <div style="font-weight:700;font-size:16px;color:var(--accent);margin-top:4px">${clp(o.total)}</div>
          </div>
          <div class="item-row-actions">
            ${o.status==='pendiente'?`<button class="btn btn-outline-blue btn-sm" onclick="markOrder(${o.id},'entregado')">Entregado</button>`:''}
            ${o.status==='entregado'?`<button class="btn btn-outline-green btn-sm" onclick="markOrder(${o.id},'pagado')">Pagado</button>`:''}
            <button class="btn btn-outline-red btn-sm" onclick="deleteOrder(${o.id})">Borrar</button>
          </div>
        </div>`).join('')}`;
}

function openOrderModal() {
  const clientOpts = [{v:'',l:'— Selecciona cliente —'}, ...state.clients.map(c=>({v:c.id,l:c.name}))];
  const prodOpts = [{v:'',l:'— Selecciona producto —'}, ...state.inventory.map(i=>({v:i.id,l:i.product}))];
  const html = `
    ${formGroup('Cliente *', sel('oc',clientOpts,''))}
    ${formGroup('Producto *', sel('op',prodOpts,''))}
    <div class="form-row">
      ${formGroup('Cantidad *', inp('oq','number',1))}
      ${formGroup('Precio unitario (CLP) *', inp('oup','number',0))}
    </div>
    <div class="total-box" id="orderTotal">Total: $0</div>
    ${formGroup('Forma de pago', sel('opm',[{v:'transferencia',l:'Transferencia'},{v:'efectivo',l:'Efectivo'},{v:'cheque',l:'Cheque'},{v:'crédito',l:'Crédito (pago diferido)'}],'transferencia'))}
    ${formGroup('Fecha', inp('od','date',today()))}
    ${formGroup('Notas', inp('on','text','','Observaciones del pedido'))}
    <div class="modal-footer">
      <button class="btn" style="background:#f5f5f5;border-color:#f5f5f5;color:#666" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveOrder()">Crear Pedido</button>
    </div>`;
  modal('Nuevo Pedido', html);
  // Live total
  setTimeout(()=>{
    ['oq','oup'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.addEventListener('input',updateOrderTotal);
    });
  },100);
}

function updateOrderTotal() {
  const q=parseFloat(document.getElementById('oq')?.value)||0;
  const p=parseFloat(document.getElementById('oup')?.value)||0;
  const el=document.getElementById('orderTotal');
  if(el) el.textContent='Total: '+clp(q*p);
}

function saveOrder() {
  const clientId = gv('oc'); const prodId = gv('op');
  const qty = parseFloat(gv('oq')); const up = parseFloat(gv('oup'));
  if(!clientId||!prodId||!qty||!up) return alert('Completa todos los campos obligatorios');
  const client = state.clients.find(c=>c.id==clientId);
  const prod = state.inventory.find(i=>i.id==prodId);
  const order = {
    id:Date.now(), clientId, clientName:client?.name||'', product:prod?.product||'',
    qty, unitPrice:up, total:qty*up, paymentMethod:gv('opm'),
    date:gv('od')||today(), notes:gv('on'), status:'pendiente'
  };
  state.orders.push(order);
  persist('orders'); closeModal(); render(); toast('✅ Pedido creado');
}

function markOrder(id, status) {
  const order = state.orders.find(o=>o.id===id);
  state.orders = state.orders.map(o=>o.id===id?{...o,status}:o);
  persist('orders');
  if(status==='pagado' && order) {
    state.transactions.push({
      id:Date.now(), type:'ingreso', category:'Venta',
      description:`Pago pedido: ${order.clientName}`, amount:order.total, date:today()
    });
    persist('transactions');
    toast('💰 Pedido marcado como pagado — ingreso registrado');
  } else {
    toast('📦 Estado actualizado');
  }
  render();
}

function deleteOrder(id) {
  if(!confirm('¿Eliminar pedido?')) return;
  state.orders = state.orders.filter(o=>o.id!==id);
  persist('orders'); render(); toast('🗑️ Pedido eliminado');
}

// ─── Inventory ────────────────────────────────────────────────────────────────
function renderInventory() {
  const { inventory } = state;
  return `
    <div class="page-header">
      <h1 class="page-title">Inventario</h1>
      <button class="btn btn-primary" onclick="openInvModal()">
        ${svgIcon('M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',16)} Agregar
      </button>
    </div>
    ${inventory.map(item=>`
      <div class="item-row">
        <div class="item-row-body">
          <div class="item-name">${item.product}</div>
          <div class="item-meta">
            Costo: <b>${clp(item.unitCost)}/${item.unit}</b> &nbsp;|&nbsp;
            Stock: <b style="color:${item.stock<5?'#EF4444':'#10B981'}">${item.stock} ${item.unit}s</b> &nbsp;|&nbsp;
            Valor total: <b>${clp(item.stock*item.unitCost)}</b>
          </div>
        </div>
        <div class="item-row-actions">
          <button class="btn btn-outline-blue btn-sm" onclick="openInvModal(${item.id})">Editar</button>
          <button class="btn btn-outline-red btn-sm" onclick="deleteInv(${item.id})">Borrar</button>
        </div>
      </div>`).join('')}`;
}

function openInvModal(id) {
  const i = id ? state.inventory.find(x=>x.id===id) : {};
  const html = `
    ${formGroup('Nombre del producto *', inp('ip','text',i.product,'Papel A4 75g resma 500hjs'))}
    <div class="form-row">
      ${formGroup('Stock actual', inp('is','number',i.stock||0))}
      ${formGroup('Costo unitario (CLP)', inp('ic','number',i.unitCost||0))}
    </div>
    ${formGroup('Unidad', sel('iu',[{v:'resma',l:'Resma'},{v:'caja',l:'Caja'},{v:'unidad',l:'Unidad'}],i.unit||'resma'))}
    <div class="modal-footer">
      <button class="btn" style="background:#f5f5f5;border-color:#f5f5f5;color:#666" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveInv(${id||0})">Guardar</button>
    </div>`;
  modal(id?'Editar Producto':'Nuevo Producto', html);
}

function saveInv(id) {
  const product = gv('ip').trim();
  if(!product) return alert('El nombre es obligatorio');
  const item = {id:id||Date.now(), product, stock:parseFloat(gv('is'))||0, unitCost:parseFloat(gv('ic'))||0, unit:gv('iu')};
  if(id) state.inventory = state.inventory.map(x=>x.id===id?item:x);
  else state.inventory.push(item);
  persist('inventory'); closeModal(); render(); toast('✅ Producto guardado');
}

function deleteInv(id) {
  if(!confirm('¿Eliminar producto?')) return;
  state.inventory = state.inventory.filter(i=>i.id!==id);
  persist('inventory'); render(); toast('🗑️ Producto eliminado');
}

// ─── Accounting ───────────────────────────────────────────────────────────────
function renderAccounting() {
  const { transactions } = state;
  const ing = transactions.filter(t=>t.type==='ingreso').reduce((s,t)=>s+t.amount,0);
  const gas = transactions.filter(t=>t.type==='gasto').reduce((s,t)=>s+t.amount,0);
  const util = ing - gas;
  return `
    <div class="page-header">
      <h1 class="page-title">Contabilidad</h1>
      <button class="btn btn-primary" onclick="openTxModal()">
        ${svgIcon('M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z',16)} Registrar
      </button>
    </div>
    <div class="grid-3">
      ${statCard('Total Ingresos', clp(ing), 'Ventas y otros ingresos', '#10B981')}
      ${statCard('Total Gastos', clp(gas), 'Compras y egresos', '#EF4444')}
      ${statCard('Utilidad', clp(util), util>=0?'Balance positivo ✅':'Balance negativo ⚠️', util>=0?'#10B981':'#EF4444')}
    </div>
    <div class="card">
      <div class="section-title">Movimientos</div>
      ${transactions.length===0
        ? '<p style="color:var(--muted);font-size:14px">Sin movimientos registrados</p>'
        : [...transactions].sort((a,b)=>b.date?.localeCompare(a.date)).map(t=>`
          <div class="tx-row">
            <div style="flex:1;min-width:0">
              ${badge(t.type, t.type==='ingreso'?'#10B981':'#EF4444')}
              <span style="font-weight:600;font-size:14px;margin-left:8px">${t.description}</span>
              <span style="font-size:12px;color:var(--muted);margin-left:6px">· ${t.category} · ${t.date}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
              <span class="tx-amount" style="color:${t.type==='ingreso'?'#10B981':'#EF4444'}">
                ${t.type==='ingreso'?'+':'-'}${clp(t.amount)}
              </span>
              <button onclick="deleteTx(${t.id})" style="background:none;border:none;cursor:pointer;color:#ddd;padding:2px">
                ${svgIcon('M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z',16)}
              </button>
            </div>
          </div>`).join('')}
    </div>`;
}

function openTxModal(defaultType='gasto') {
  const catsByType = {
    ingreso: [{v:'Venta',l:'Venta'},{v:'Otro ingreso',l:'Otro ingreso'}],
    gasto: [{v:'Compra papel',l:'Compra papel'},{v:'Transporte',l:'Transporte/Despacho'},{v:'Publicidad',l:'Publicidad'},{v:'Otro gasto',l:'Otro gasto'}]
  };
  const html = `
    ${formGroup('Tipo', sel('tt',[{v:'gasto',l:'💸 Gasto'},{v:'ingreso',l:'💰 Ingreso'}],defaultType))}
    <div id="txCatWrap">${formGroup('Categoría', sel('tcat',catsByType[defaultType],catsByType[defaultType][0].v))}</div>
    ${formGroup('Descripción *', inp('td','text','','Describe el movimiento'))}
    <div class="form-row">
      ${formGroup('Monto (CLP) *', inp('tam','number',0))}
      ${formGroup('Fecha', inp('tdate','date',today()))}
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:#f5f5f5;border-color:#f5f5f5;color:#666" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTx()">Guardar</button>
    </div>`;
  modal('Registrar Movimiento', html);
  setTimeout(()=>{
    const ttEl = document.getElementById('tt');
    if(ttEl) ttEl.addEventListener('change', ()=>{
      const type = ttEl.value;
      const cats = type==='ingreso'?[{v:'Venta',l:'Venta'},{v:'Otro ingreso',l:'Otro ingreso'}]:[{v:'Compra papel',l:'Compra papel'},{v:'Transporte',l:'Transporte/Despacho'},{v:'Publicidad',l:'Publicidad'},{v:'Otro gasto',l:'Otro gasto'}];
      document.getElementById('txCatWrap').innerHTML = formGroup('Categoría', sel('tcat',cats,cats[0].v));
    });
  },100);
}

function saveTx() {
  const desc = gv('td').trim(); const amount = parseFloat(gv('tam'));
  if(!desc||!amount) return alert('Completa descripción y monto');
  state.transactions.push({id:Date.now(), type:gv('tt'), category:gv('tcat'), description:desc, amount, date:gv('tdate')||today()});
  persist('transactions'); closeModal(); render(); toast('✅ Movimiento registrado');
}

function deleteTx(id) {
  state.transactions = state.transactions.filter(t=>t.id!==id);
  persist('transactions'); render(); toast('🗑️ Movimiento eliminado');
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderNav();
  const pages = { dashboard:renderDashboard, clients:renderClients, orders:renderOrders, inventory:renderInventory, accounting:renderAccounting };
  document.getElementById('content').innerHTML = (pages[state.tab]||renderDashboard)();
}

render();
</script>
</body>
</html>
